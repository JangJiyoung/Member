<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원관리 시스템</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; --danger: #e74c3c; --success: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        
        /* 메인 컨테이너: 높이를 내부 콘텐츠에 맞춤 */
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            max-height: 90vh; /* 화면을 벗어나지 않게 설정 */
        }

        h2 { text-align: center; color: #333; margin-top: 0; margin-bottom: 20px; }
        
        /* 상단 고정 영역 */
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; flex-shrink: 0; }
        input[type="text"], input[type="email"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* 목록 스크롤 영역 (핵심 수정 부분) */
        .member-list-wrapper {
            overflow-y: auto; /* 6개 넘으면 스크롤 생성 */
            max-height: 340px; /* 항목당 약 56px * 6개 = 336px 내외 */
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .member-list { list-style: none; padding: 0; margin: 0; }
        .member-item { 
            background: #fff; 
            border-bottom: 1px solid #eee; 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
        }
        .member-item:last-child { border-bottom: none; }
        .member-item:hover { background: #f8fbff; }
        .member-info { display: flex; flex-direction: column; pointer-events: none; }
        .member-name { font-weight: bold; color: #2c3e50; font-size: 15px; }
        .member-email { font-size: 13px; color: #7f8c8d; margin-top: 2px; }

        /* 모달 스타일 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 85%; max-width: 320px; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .modal-buttons { display: flex; justify-content: space-between; margin-top: 20px; }
        .right-btns { display: flex; gap: 8px; }
        
        button { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; color: white; font-weight: 500; }
        .btn-save { background: var(--success); }
        .btn-delete { background: var(--danger); }
        .btn-close { background: #95a5a6; }

        /* 스크롤바 디자인 (선택사항) */
        .member-list-wrapper::-webkit-scrollbar { width: 6px; }
        .member-list-wrapper::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>회원관리</h2>
    
    <!-- 상단 고정: 검색 및 추가 -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="회원 이름 검색..." oninput="filterMembers()">
        <button class="btn-add" onclick="openModal('create')">추가</button>
    </div>

    <!-- 스크롤 가능한 목록 영역 -->
    <div class="member-list-wrapper">
        <div id="loading" style="text-align:center; padding: 20px; color: #888;">데이터 불러오는 중...</div>
        <ul id="memberList" class="member-list"></ul>
    </div>
</div>

<!-- 모달 (동일) -->
<div id="memberModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top:0">회원 정보</h3>
        <input type="hidden" id="targetId">
        <input type="text" id="newName" placeholder="이름 입력">
        <input type="email" id="newEmail" placeholder="이메일 입력">
        
        <div class="modal-buttons">
            <button class="btn-delete" id="deleteBtn" onclick="sendData('delete')" style="display:none;">삭제</button>
            <div class="right-btns">
                <button class="btn-close" onclick="closeModal()">취소</button>
                <button class="btn-save" id="saveBtn" onclick="sendData('create')">저장</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz8gb2puQdi8fFgy2FF85PQkH9sg4eOHVC5oeDUn6VtIUPEb8UwjMbppyI33Qb5Rv2LPQ/exec";
    let allMembers = [];

    async function loadMembers() {
        try {
            const response = await fetch(API_URL);
            allMembers = await response.json();
            displayMembers(allMembers);
            document.getElementById('loading').style.display = 'none';
        } catch (e) {
            document.getElementById('loading').innerText = "데이터 로드 실패";
        }
    }

    function displayMembers(members) {
        const listEl = document.getElementById('memberList');
        listEl.innerHTML = members.map(m => `
            <li class="member-item" onclick="openModal('update', '${m.id}', '${m.name}', '${m.email}')">
                <div class="member-info">
                    <span class="member-name">${m.name}</span>
                    <span class="member-email">${m.email}</span>
                </div>
                <span style="color:#ccc; font-size:12px;">▶</span>
            </li>
        `).join('');
    }

    function filterMembers() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allMembers.filter(m => m.name.toLowerCase().includes(keyword));
        displayMembers(filtered);
    }

    function openModal(mode, id = '', name = '', email = '') {
        const modal = document.getElementById('memberModal');
        const searchInputVal = document.getElementById('searchInput').value;

        document.getElementById('targetId').value = id;
        document.getElementById('newName').value = name || (mode === 'create' ? searchInputVal : '');
        document.getElementById('newEmail').value = email;

        if (mode === 'create') {
            document.getElementById('modalTitle').innerText = "새 회원 등록";
            document.getElementById('saveBtn').innerText = "추가";
            document.getElementById('deleteBtn').style.display = "none";
        } else {
            document.getElementById('modalTitle').innerText = "회원 정보 수정";
            document.getElementById('saveBtn').innerText = "수정";
            document.getElementById('deleteBtn').style.display = "block";
        }
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('memberModal').style.display = 'none'; }

    async function sendData(action) {
        if (action === 'delete' && !confirm("정말 삭제하시겠습니까?")) return;
        const payload = {
            action: action,
            id: document.getElementById('targetId').value,
            name: document.getElementById('newName').value,
            email: document.getElementById('newEmail').value
        };
        
        const btn = event.target;
        btn.disabled = true;
        
        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            closeModal();
            loadMembers();
        } catch (e) {
            alert("처리 중 오류 발생");
        } finally {
            btn.disabled = false;
        }
    }

    window.onload = loadMembers;
</script>
</body>
</html>
