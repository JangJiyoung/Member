<!DOCTYPE html>
<html>
<body>
  <h3>구글 시트 연동 CRUD</h3>
  
  <!-- 입력 폼 -->
  <input type="text" id="name" placeholder="이름">
  <input type="email" id="email" placeholder="이메일">
  <button onclick="sendData('create')">추가</button>
  
  <hr>
  
  <!-- 수정/삭제용 (ID 기반) -->
  <input type="text" id="targetId" placeholder="수정/삭제할 ID">
  <button onclick="sendData('update')">수정</button>
  <button onclick="sendData('delete')">삭제</button>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz8gb2puQdi8fFgy2FF85PQkH9sg4eOHVC5oeDUn6VtIUPEb8UwjMbppyI33Qb5Rv2LPQ/exec";

    async function sendData(action) {
      const data = {
        action: action,
        id: document.getElementById('targetId').value,
        name: document.getElementById('name').value,
        email: document.getElementById('email').value
      };

      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(data)
      });

      const result = await response.text();
      alert(result);
      location.reload(); // 상태 반영을 위해 새로고침
    }
  </script>
</body>
</html>
